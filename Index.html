<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafiz Muhammad AFAQ Attari - Quran Pak</title>
    <style>
        /* --- CSS STYLING START --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        /* Ragistan (Night) Background with Stars */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.3; transform: scale(0.8); }
        }

        /* Main Layout (Flexbox) */
        .container {
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
        }

        /* Left Side (Madina Image) */
        .left-side {
            flex: 1;
            min-width: 300px;
            background-image: url('https://source.unsplash.com/1600x900/?madina,masjid'); /* Yahan Madina ki Photo Lagayen */
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 50px;
        }

        .madina-overlay {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            text-align: center;
            border-top: 3px solid #ffd700; /* Gold Color */
            backdrop-filter: blur(5px);
            width: 100%;
        }

        .madina-title {
            font-size: 24px;
            color: #ffd700;
            margin: 0;
            font-family: 'Traditional Arabic', serif;
        }

        /* Right Side (Profile Dashboard) */
        .right-side {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            text-align: center;
        }

        /* Profile Picture */
        .profile-pic {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid #ffd700;
            object-fit: cover;
            margin-bottom: 20px;
            background-color: #333; /* Placeholder color */
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .role {
            font-size: 18px;
            color: #ddd;
            margin-bottom: 30px;
        }

        /* Contact Details */
        .contact-info {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            max-width: 350px;
            text-align: left;
            margin-bottom: 20px;
            border: 1px solid #ffd700;
        }

        .contact-item {
            margin: 10px 0;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .contact-label {
            color: #ffd700;
            font-weight: bold;
            margin-right: 10px;
            width: 60px;
        }

        /* WhatsApp Button */
        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            margin-top: 10px;
            width: 80%;
            justify-content: center;
        }

        .whatsapp-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6);
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .left-side {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>

    <!-- Star Background Effect -->
    <div class="stars-container" id="stars"></div>

    <div class="container">
        <!-- LEFT SIDE: MADINA -->
        <div class="left-side">
            <div class="madina-overlay">
                <h2 class="madina-title">Madina Sharif</h2>
                <p>Masjid al-Nabawi</p>
            </div>
        </div>

        <!-- RIGHT SIDE: DASHBOARD / PROFILE -->
        <div class="right-side">
            <!-- Yahan Aapki Photo Lagayen (src mein aapki file ka naam) -->
            <img src="https://via.placeholder.com/200" alt="Profile Picture" class="profile-pic">

            <h1>Hafiz Muhammad AFAQ Attari</h1>
            <p class="role">Quran Pak Reciter & Teacher</p>

            <div class="contact-info">
                <div class="contact-item">
                    <span class="contact-label">UAE:</span>
                    <span>+971 505859816</span>
                </div>
                <div class="contact-item">
                    <span class="contact-label">PK:</span>
                    <span>+92 3411472338</span>
                </div>
                <div class="contact-item">
                    <span class="contact-label">Email:</span>
                    <span>sardarafaqqds@gmail.com</span>
                </div>
            </div>

            <!-- WhatsApp Direct Link -->
            <a href="https://wa.me/971505859816?text=Assalamu Alaikum Hafiz Sb, I need Quran recitation." target="_blank" class="whatsapp-btn">
                💬 Message on WhatsApp
            </a>
        </div>
    </div>

    <script>
        // Automatic Star Generation Script
        const starsContainer = document.getElementById('stars');
        const starCount = 100; // Number of stars

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            
            // Random position and size
            const xy = Math.random() * 100;
            const size = Math.random() * 2 + 1;
            
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            
            // Random animation delay
            star.style.animationDelay = `${Math.random() * 2}s`;
            
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
