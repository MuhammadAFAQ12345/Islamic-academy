<!DOCTYPE html>
<html>
<head>
<title>Symphonies Melb LMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6fb}
header{background:#0f172a;color:white;padding:15px;text-align:center}
.box{max-width:400px;margin:40px auto;background:white;padding:20px;border-radius:10px}
input,button,select{width:100%;padding:10px;margin-top:10px}
button{background:#0f172a;color:white;border:none;cursor:pointer}
button:hover{background:#1e3a8a}

nav{display:flex;justify-content:center;gap:10px;margin-top:10px}
nav button{width:auto;padding:8px 12px}
.hidden{display:none}
</style>
</head>

<body>

<header>
🕌 Symphonies Melb - REAL LMS SYSTEM
</header>

<nav>
<button onclick="show('login')">Login</button>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="logout()">Logout</button>
</nav>

<!-- LOGIN -->
<div id="login" class="box">
<h3>Student Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box hidden">
<h3>Student Dashboard</h3>

<p>✔ Welcome to Quran Academy</p>

<select>
<option>Madani Qaida</option>
<option>Quran Reading</option>
<option>Tajweed</option>
<option>Hifz Program</option>
</select>

<button onclick="joinClass()">Join Live Class (Zoom)</button>
<button onclick="pay()">Pay Fee</button>

<p id="status"></p>
</div>

<script>
// Firebase Config (PASTE YOURS)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

// SIGNUP
function signup(){
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

auth.createUserWithEmailAndPassword(email,pass)
.then(()=>document.getElementById("msg").innerText="Account Created ✔")
.catch(e=>alert(e.message));
}

// LOGIN
function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

auth.signInWithEmailAndPassword(email,pass)
.then(()=>show('dashboard'))
.catch(e=>alert(e.message));
}

// LOGOUT
function logout(){
auth.signOut();
show('login');
}

// NAV
function show(id){
document.getElementById("login").classList.add("hidden");
document.getElementById("dashboard").classList.add("hidden");
document.getElementById(id).classList.remove("hidden");
}

// LIVE CLASS
function joinClass(){
window.open("https://meet.google.com","_blank");
document.getElementById("status").innerText="Joining Live Class...";
}

// PAYMENT (demo link)
function pay(){
window.open("https://wa.me/923411472338?text=I%20want%20to%20pay%20Quran%20fee","_blank");
}
</script>

</body>
</html>
